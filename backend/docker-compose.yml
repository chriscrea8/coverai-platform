version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coverai-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - coverai-network

  postgres:
    image: postgres:15-alpine
    container_name: coverai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    networks:
      - coverai-network

  redis:
    image: redis:7-alpine
    container_name: coverai-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - coverai-network

volumes:
  postgres_data:
  redis_data:

networks:
  coverai-network:
    driver: bridge
